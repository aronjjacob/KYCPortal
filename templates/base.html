<!DOCTYPE html>
<html>
<head>
    <title>Digital KYC Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { background-color: #333; color: white; padding: 10px; }
        nav h2 { margin: 0; display: inline-block; }
        nav a, nav button { color: white; text-decoration: none; margin-left: 20px; background: none; border: none; cursor: pointer; font-size: 14px; }
        nav a:hover, nav button:hover { text-decoration: underline; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        form { margin-top: 20px; }
        input, button { padding: 8px; margin: 5px 0; }
        button { background-color: #333; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #555; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 10px; margin: 10px 0; background-color: #f0f0f0; border-left: 4px solid #333; }
    </style>
</head>
<body>
    <nav>
        <h2>Digital KYC Portal</h2>

        {% if user.is_authenticated %}
            <a href="{% url 'client_dashboard' %}">Dashboard</a>

            <form method="POST" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>

    <div class="container">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
